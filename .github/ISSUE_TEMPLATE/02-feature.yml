name: Feature Request
description: Suggest a new design pattern or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the pattern, technique, or improvement you'd like added.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Link to websites or screenshots that demonstrate this technique.
    validations:
      required: false
